<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Shield — Stop Data Leaks to ChatGPT & AI Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0D1117;
  --ink-soft: #3A4250;
  --accent: #0052CC;
  --border: #E3E8EF;
  --radius: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #FFFFFF;
  color: var(--ink);
}

/* ─── NAV ADJUSTMENTS ─── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100px; /* Altura aumentada para a logo de 75px */
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 24px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--ink);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 22px;
}

/* ─── LOGO IMAGE STYLE ─── */
.logo-container {
  width: 75px;
  height: 75px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.logo-img {
  width: 75px;  /* Tamanho exato solicitado */
  height: 75px; /* Tamanho exato solicitado */
  object-fit: contain; /* Garante que a imagem não distorça */
}

.nav-links {
  display: flex;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  font-size: 14px;
  text-decoration: none;
  color: var(--ink-soft);
}

.btn {
  padding: 10px 20px;
  border-radius: var(--radius);
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

/* Reaplicando para o footer também */
.footer-logo-img {
  width: 75px;
  height: 75px;
  object-fit: contain;
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="logo">
      <div class="logo-container">
        <img src="logo_full.png" alt="AI Shield Logo" class="logo-img">
      </div>
    </a>
    
    <ul class="nav-links">
      <li><a href="#features">Features</a></li>
      <li><a href="#how">How it Works</a></li>
      <li><a href="#pricing">Pricing</a></li>
    </ul>

    <div class="nav-actions">
      <a href="#" class="btn btn-primary">Start Free Trial</a>
    </div>
  </div>
</nav>

</body>
</html>
