<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Shield</title>
    <link rel="icon" type="image/png" href="/icon_1_.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #002d5c;
            --primary-blue: #1e5ba8;
            --accent-cyan: #00a8e8;
            --accent-green: #22c55e;
            --text-primary: #1a1a2e;
            --text-secondary: #64748b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background: linear-gradient(160deg, var(--primary-dark) 0%, #003d7a 50%, var(--primary-blue) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-section img {
            width: 60px;
            height: 60px;
            margin-bottom: 1rem;
        }

        .logo-section h1 {
            font-size: 1.75rem;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .logo-section p {
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9375rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
            background: var(--bg-white);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 4px rgba(0, 168, 232, 0.1);
        }

        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-password a {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-green);
            color: white;
            padding: 1.25rem;
            border: none;
            border-radius: 12px;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.25);
            margin-top: 1.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
            background: #16a34a;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        .signup-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9375rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9375rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 640px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="/icon_1_.png" alt="AI Shield Logo">
            <h1>Welcome Back</h1>
            <p>Login to your AI Shield account</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" required placeholder="your.email@company.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" required placeholder="Enter your password" autocomplete="current-password">
                <div class="forgot-password">
                    <a href="#" onclick="alert('Please contact support@aishield.eu to reset your password.'); return false;">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                Login
            </button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="/signup?plan=professional">Start free trial</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://ai-shield-backend-production.up.railway.app';

        // Check if already logged in (but don't redirect yet - let user see page)
        const existingToken = localStorage.getItem('authToken');
        
        // If user is already logged in and intentionally came to login page,
        // show them a message but don't auto-redirect
        if (existingToken) {
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = 'You are already logged in. Redirecting to dashboard...';
            successMsg.classList.add('show');
            
            // Wait 2 seconds before redirect so user sees the message
            setTimeout(() => {
                window.location.href = '/company-dashboard';
            }, 2000);
        }

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            // Get form data
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            try {
                // Call login API
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Save auth data to localStorage
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('company', JSON.stringify(data.company));

                // Save to Chrome extension storage (if extension is installed)
                if (window.chrome && chrome.runtime) {
                    try {
                        chrome.storage.local.set({
                            authToken: data.token,
                            user: JSON.stringify(data.user),
                            company: JSON.stringify(data.company)
                        });
                    } catch (err) {
                        console.log('Extension not installed (optional)');
                    }
                }

                // Show success message
                successMsg.textContent = 'Login successful! Redirecting...';
                successMsg.classList.add('show');

                // Redirect to dashboard after short delay
                setTimeout(() => {
                    window.location.href = '/company-dashboard';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = error.message || 'Invalid email or password. Please try again.';
                errorMsg.classList.add('show');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
